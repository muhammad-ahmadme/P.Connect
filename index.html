<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>Home | PSDROA.connect</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --blue: #1d9bf0; --border: #2f3336; --dim: #71767b; --hover: rgba(255,255,255,0.05); }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #000; color: #fff; font-family: -apple-system, sans-serif; display: flex; justify-content: center; height: 100vh; overflow: hidden; }
        
        .layout { display: flex; width: 100%; max-width: 1250px; height: 100%; }
        
        /* Left Nav */
        .nav { width: 275px; border-right: 1px solid var(--border); padding: 20px; display: flex; flex-direction: column; justify-content: space-between; }
        .nav-links { display: flex; flex-direction: column; gap: 5px; }
        .nav-item { display: flex; align-items: center; gap: 20px; padding: 12px 20px; font-size: 1.25rem; cursor: pointer; border-radius: 99px; transition: 0.2s; width: fit-content; }
        .nav-item:hover { background: var(--hover); }
        .nav-item.active { font-weight: 800; }
        .btn-large { background: var(--blue); color: white; border: none; padding: 15px; border-radius: 99px; font-weight: bold; font-size: 1.1rem; cursor: pointer; width: 90%; margin-top: 15px; }
        
        /* Main Area */
        .main { flex: 1; max-width: 600px; border-right: 1px solid var(--border); overflow-y: auto; position: relative; display: flex; flex-direction: column; }
        .main::-webkit-scrollbar { display: none; }
        .glass-header { position: sticky; top: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(12px); z-index: 10; border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 15px; gap: 15px; }
        .feed-tabs { display: flex; border-bottom: 1px solid var(--border); }
        .tab { flex: 1; text-align: center; padding: 15px; cursor: pointer; font-weight: bold; color: var(--dim); transition: 0.2s; }
        .tab:hover { background: var(--hover); }
        .tab.active { color: #fff; border-bottom: 4px solid var(--blue); }
        
        /* Composer & Cards */
        .composer { padding: 15px; border-bottom: 1px solid var(--border); display: flex; gap: 15px; }
        .avatar { width: 40px; height: 40px; background: #333; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; flex-shrink: 0; }
        .composer textarea { width: 100%; background: none; border: none; color: #fff; font-size: 1.25rem; outline: none; resize: none; min-height: 50px; padding-top: 10px; }
        .card { padding: 15px; border-bottom: 1px solid var(--border); display: flex; gap: 15px; cursor: pointer; transition: 0.2s; }
        .card:hover { background: rgba(255,255,255,0.02); }
        .card-actions { display: flex; gap: 30px; margin-top: 12px; color: var(--dim); }
        .action { display: flex; align-items: center; gap: 5px; font-size: 0.9rem; cursor: pointer; transition: 0.2s; }
        .action:hover { color: var(--blue); }
        .action.liked { color: #f91880; }

        /* Widgets */
        .widgets { width: 350px; padding: 20px; overflow-y: auto; }
        .search-bar { background: #202327; border: none; padding: 15px 20px; border-radius: 99px; width: 100%; color: white; outline: none; margin-bottom: 20px; }
        .search-bar:focus { background: #000; border: 1px solid var(--blue); }
        
        /* Messages specific */
        .msg-bubble { padding: 10px 15px; border-radius: 18px; max-width: 75%; margin-bottom: 10px; word-wrap: break-word; }
        .msg-sent { background: var(--blue); align-self: flex-end; border-bottom-right-radius: 4px; }
        .msg-recv { background: #2f3336; align-self: flex-start; border-bottom-left-radius: 4px; }
        .chat-container { display: flex; flex-direction: column; flex: 1; overflow: hidden; }
        .chat-stream { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; }
        .chat-input-area { padding: 15px; border-top: 1px solid var(--border); background: #000; }
        .chat-input-area input { width: 100%; background: #202327; border: none; padding: 12px 15px; border-radius: 99px; color: white; outline: none; }
    </style>
</head>
<body>
    <div class="layout">
        <nav class="nav">
            <div>
                <div style="font-size: 2.5rem; font-weight: 900; margin-bottom: 20px; padding-left: 15px;">P.</div>
                <div class="nav-links">
                    <div class="nav-item active" onclick="App.switch('home')"><i data-lucide="home"></i> Home</div>
                    <div class="nav-item" onclick="App.switch('explore')"><i data-lucide="search"></i> Explore</div>
                    <div class="nav-item" onclick="App.switch('messages')"><i data-lucide="mail"></i> Messages</div>
                    <div class="nav-item" onclick="App.switch('profile')"><i data-lucide="user"></i> Profile</div>
                </div>
                <button class="btn-large" onclick="App.switch('home'); document.getElementById('postIn').focus();">Post</button>
            </div>
            <div class="nav-item" style="color:#f4212e;" onclick="App.logout()"><i data-lucide="log-out"></i> Logout</div>
        </nav>

        <main class="main">
            <div id="v-home" class="v" style="display:flex; flex-direction:column; flex:1;">
                <div class="glass-header"><h2 style="font-size: 1.2rem;">Home</h2></div>
                <div class="feed-tabs">
                    <div class="tab active" id="tab-global" onclick="Feed.setMode('global')">For You</div>
                    <div class="tab" id="tab-follow" onclick="Feed.setMode('following')">Following</div>
                </div>
                <div class="composer">
                    <div class="avatar" id="my-avatar">?</div>
                    <div style="flex: 1;">
                        <textarea id="postIn" placeholder="What is happening?!"></textarea>
                        <div style="text-align: right;"><button class="btn-large" style="width: 80px; padding: 8px; margin-top: 0;" onclick="Feed.post()">Post</button></div>
                    </div>
                </div>
                <div id="feed-stream"></div>
            </div>

            <div id="v-explore" class="v" style="display:none; padding: 15px;">
                <h2 style="margin-bottom: 15px;">Discover People</h2>
                <input type="text" placeholder="Search the world..." class="search-bar" oninput="App.search(this.value)">
                <div id="search-results"></div>
            </div>

            <div id="v-messages" class="v" style="display:none; flex-direction:column; flex:1; height:100%;">
                <div id="msg-list-view" style="display:block; flex:1; overflow-y:auto;">
                    <div class="glass-header"><h2 style="font-size: 1.2rem;">Messages</h2></div>
                    <div style="padding: 15px;">
                        <input type="text" placeholder="Search users to message..." class="search-bar" oninput="DMs.searchUsers(this.value)" style="margin-bottom:0;">
                    </div>
                    <div id="msg-contacts-root"></div>
                </div>
                
                <div id="msg-chat-view" class="chat-container" style="display:none;">
                    <div class="glass-header" style="cursor:pointer;" onclick="DMs.closeChat()">
                        <i data-lucide="arrow-left"></i>
                        <h2 style="font-size: 1.2rem;" id="chat-title">Chat</h2>
                    </div>
                    <div class="chat-stream" id="chat-stream"></div>
                    <div class="chat-input-area">
                        <input type="text" id="chatIn" placeholder="Start a new message" onkeypress="if(event.key==='Enter') DMs.send()">
                    </div>
                </div>
            </div>

            <div id="v-profile" class="v" style="display:none;">
                <div class="glass-header"><h2 style="font-size: 1.2rem;">Profile</h2></div>
                <div style="padding: 20px; border-bottom: 1px solid var(--border);">
                    <div class="avatar" style="width: 100px; height: 100px; font-size: 3rem;" id="prof-av">?</div>
                    <h2 style="margin-top: 15px;" id="prof-name">@username</h2>
                    <p style="color: var(--dim); margin-top: 10px;" id="prof-bio">Bio loading...</p>
                    <div style="margin-top: 20px; display:flex; gap:10px;">
                        <input type="text" id="edit-bio" class="search-bar" style="margin:0; border-radius:8px;" placeholder="Update your bio">
                        <button class="btn-large" style="width: auto; padding: 8px 20px; margin:0;" onclick="App.updateBio()">Save</button>
                    </div>
                </div>
                <div id="my-posts"></div>
            </div>
        </main>

        <aside class="widgets">
            <input type="text" class="search-bar" placeholder="Search PSDROA...">
            <div style="background: #16181c; border-radius: 16px; padding: 15px;">
                <h3 style="margin-bottom: 15px;">What's happening</h3>
                <div style="margin-bottom: 15px; cursor: pointer;">
                    <div style="color: var(--dim); font-size: 0.8rem;">Trending globally</div>
                    <b>#PSDROAConnect</b>
                    <div style="color: var(--dim); font-size: 0.8rem;">12.4K posts</div>
                </div>
            </div>
        </aside>
    </div>

    <script>
        const _URL = 'https://aelkiokxzzfnfvermrjy.supabase.co';
        const _KEY = 'sb_publishable_r8ncudJ8R49sXNlsE3OKvA_D4Ak_CHC';
        const _db = supabase.createClient(_URL, _KEY);
        
        // Connect Backend URL 
        const BACKEND_URL = 'http://localhost:3000';

        let me = null, profile = null, feedMode = 'global', likesSet = new Set(), activePeer = null;

        const App = {
            async init() {
                const { data: { session } } = await _db.auth.getSession();
                if(!session) { window.location.replace('auth.html'); return; }
                me = session.user;
                
                const { data: p } = await _db.from('profiles').select('*').eq('id', me.id).single();
                profile = p;
                
                document.getElementById('my-avatar').innerText = p.username[0].toUpperCase();
                document.getElementById('prof-av').innerText = p.username[0].toUpperCase();
                document.getElementById('prof-name').innerText = `@${p.username}`;
                document.getElementById('prof-bio').innerText = p.bio || "No bio yet.";
                document.getElementById('edit-bio').value = p.bio || "";

                const { data: lks } = await _db.from('likes').select('post_id').eq('user_id', me.id);
                if(lks) lks.forEach(l => likesSet.add(l.post_id));

                lucide.createIcons();
                Feed.load();
                DMs.loadContacts();

                // Global Realtime Listener for Feed and DMs
                _db.channel('public_changes')
                   .on('postgres_changes', {event:'*', schema:'public', table:'world_posts'}, () => Feed.load())
                   .on('postgres_changes', {event:'*', schema:'public', table:'messages'}, () => { if(activePeer) DMs.loadChat(); })
                   .subscribe();
            },
            switch(id) {
                document.querySelectorAll('.v').forEach(v => { v.style.display = 'none'; v.classList.remove('active'); });
                document.querySelectorAll('.nav-item').forEach(l => l.classList.remove('active'));
                
                const target = document.getElementById('v-'+id);
                target.style.display = (id === 'messages' || id === 'home') ? 'flex' : 'block';
                
                // Highlight Nav
                const navItems = document.querySelectorAll('.nav-item');
                if(id==='home') navItems[0].classList.add('active');
                if(id==='explore') navItems[1].classList.add('active');
                if(id==='messages') navItems[2].classList.add('active');
                if(id==='profile') navItems[3].classList.add('active');

                if(id === 'profile') Feed.loadMyPosts();
                if(id === 'messages') DMs.closeChat(); 
            },
            async search(q) {
                if(!q) return document.getElementById('search-results').innerHTML = '';
                const { data } = await _db.from('profiles').select('*').ilike('username', `%${q}%`).neq('id', me.id);
                document.getElementById('search-results').innerHTML = data.map(u => `
                    <div class="card" style="align-items:center; justify-content:space-between;">
                        <div style="display:flex; gap:10px; align-items:center;">
                            <div class="avatar">${u.username[0].toUpperCase()}</div>
                            <b>@${u.username}</b>
                        </div>
                        <button class="btn-large" style="width:auto; padding:5px 15px; margin:0;" onclick="App.follow('${u.id}')">Follow</button>
                    </div>
                `).join('');
            },
            async follow(targetId) { await _db.from('follows').insert([{ follower_id: me.id, following_id: targetId }]); alert('Followed!'); },
            
            // SECURED: Bio Update
            async updateBio() {
                const txt = document.getElementById('edit-bio').value;
                const { data: { session } } = await _db.auth.getSession();

                const res = await fetch(`${BACKEND_URL}/api/profile/bio`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${session.access_token}`
                    },
                    body: JSON.stringify({ bio: txt })
                });

                if (res.ok) {
                    document.getElementById('prof-bio').innerText = txt;
                } else {
                    const errorData = await res.json();
                    alert("Failed to update bio: " + errorData.error);
                }
            },
            async logout() { await _db.auth.signOut(); sessionStorage.clear(); localStorage.clear(); window.location.replace('auth.html'); }
        };

        const Feed = {
            setMode(mode) {
                feedMode = mode;
                document.getElementById('tab-global').classList.toggle('active', mode === 'global');
                document.getElementById('tab-follow').classList.toggle('active', mode === 'following');
                this.load();
            },
            
            // SECURED: Post Creation
            async post() {
                const val = document.getElementById('postIn').value;
                if(!val) return;
                
                const { data: { session } } = await _db.auth.getSession();

                const res = await fetch(`${BACKEND_URL}/api/posts`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${session.access_token}`
                    },
                    body: JSON.stringify({ content: val })
                });

                if (res.ok) {
                    document.getElementById('postIn').value = "";
                } else {
                    const errorData = await res.json();
                    alert("Action blocked: " + errorData.error);
                }
            },
            async load() {
                let query = _db.from('world_posts').select(`id, content, created_at, user_id, profiles!inner(username)`).order('created_at', { ascending: false });
                if (feedMode === 'following') {
                    const { data: f } = await _db.from('follows').select('following_id').eq('follower_id', me.id);
                    const fIds = f.map(x => x.following_id);
                    if(fIds.length === 0) return document.getElementById('feed-stream').innerHTML = `<div style="padding:20px; text-align:center; color:var(--dim);">Not following anyone yet.</div>`;
                    query = query.in('user_id', fIds);
                }
                const { data } = await query;
                this.render(data, 'feed-stream');
            },
            async loadMyPosts() {
                const { data } = await _db.from('world_posts').select(`id, content, created_at, user_id, profiles!inner(username)`).eq('user_id', me.id).order('created_at', { ascending: false });
                this.render(data, 'my-posts');
            },
            render(data, targetDiv) {
                document.getElementById(targetDiv).innerHTML = data.map(p => {
                    const isLiked = likesSet.has(p.id);
                    return `
                    <div class="card">
                        <div class="avatar">${p.profiles.username[0].toUpperCase()}</div>
                        <div style="flex:1">
                            <b>@${p.profiles.username}</b>
                            <p style="margin-top:5px;">${p.content}</p>
                            <div class="card-actions">
                                <div class="action"><i data-lucide="message-circle" style="width:18px;"></i></div>
                                <div class="action"><i data-lucide="repeat" style="width:18px;"></i></div>
                                <div class="action ${isLiked ? 'liked' : ''}" onclick="Feed.toggleLike(${p.id}, this)"><i data-lucide="heart" style="width:18px; ${isLiked ? 'fill: currentColor;' : ''}"></i></div>
                            </div>
                        </div>
                    </div>`
                }).join('');
                lucide.createIcons();
            },
            async toggleLike(postId, el) {
                if(likesSet.has(postId)) {
                    await _db.from('likes').delete().match({ post_id: postId, user_id: me.id });
                    likesSet.delete(postId); el.classList.remove('liked'); el.querySelector('svg').style.fill = 'none';
                } else {
                    await _db.from('likes').insert([{ post_id: postId, user_id: me.id }]);
                    likesSet.add(postId); el.classList.add('liked'); el.querySelector('svg').style.fill = 'currentColor';
                }
            }
        };

        const DMs = {
            async loadContacts() {
                const { data } = await _db.from('profiles').select('*').neq('id', me.id).limit(20);
                this.renderContacts(data);
            },
            async searchUsers(q) {
                if(!q) return this.loadContacts();
                const { data } = await _db.from('profiles').select('*').ilike('username', `%${q}%`).neq('id', me.id);
                this.renderContacts(data);
            },
            renderContacts(data) {
                document.getElementById('msg-contacts-root').innerHTML = data.map(u => `
                    <div class="card" style="align-items:center;" onclick="DMs.openChat('${u.id}', '${u.username}')">
                        <div class="avatar">${u.username[0].toUpperCase()}</div>
                        <b>@${u.username}</b>
                    </div>
                `).join('');
            },
            openChat(id, username) {
                activePeer = id;
                document.getElementById('msg-list-view').style.display = 'none';
                document.getElementById('msg-chat-view').style.display = 'flex';
                document.getElementById('chat-title').innerText = `@${username}`;
                this.loadChat();
            },
            closeChat() {
                activePeer = null;
                document.getElementById('msg-chat-view').style.display = 'none';
                document.getElementById('msg-list-view').style.display = 'block';
            },
            async loadChat() {
                if(!activePeer) return;
                const { data } = await _db.from('messages').select('*').or(`and(sender_id.eq.${me.id},receiver_id.eq.${activePeer}),and(sender_id.eq.${activePeer},receiver_id.eq.${me.id})`).order('created_at', { ascending: true });
                const stream = document.getElementById('chat-stream');
                stream.innerHTML = data.map(m => `<div class="msg-bubble ${m.sender_id === me.id ? 'msg-sent' : 'msg-recv'}">${m.content}</div>`).join('');
                stream.scrollTop = stream.scrollHeight;
            },
            
            // SECURED: Message Sending
            async send() {
                const input = document.getElementById('chatIn');
                if(!input.value || !activePeer) return;
                
                const { data: { session } } = await _db.auth.getSession();

                await fetch(`${BACKEND_URL}/api/messages`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${session.access_token}`
                    },
                    body: JSON.stringify({ receiver_id: activePeer, content: input.value })
                });

                input.value = '';
            }
        };

        App.init();
    </script>
</body>
</html>
