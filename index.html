<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>Home | PSDROA.connect</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --blue: #1d9bf0; --border: #2f3336; --dim: #71767b; --hover: rgba(255,255,255,0.05); }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #000; color: #fff; font-family: -apple-system, sans-serif; display: flex; justify-content: center; height: 100vh; overflow: hidden; }
        
        .layout { display: flex; width: 100%; max-width: 1250px; height: 100%; }
        
        /* Left Nav */
        .nav { width: 275px; border-right: 1px solid var(--border); padding: 20px; display: flex; flex-direction: column; justify-content: space-between; }
        .nav-links { display: flex; flex-direction: column; gap: 5px; }
        .nav-item { display: flex; align-items: center; gap: 20px; padding: 12px 20px; font-size: 1.25rem; cursor: pointer; border-radius: 99px; transition: 0.2s; width: fit-content; }
        .nav-item:hover { background: var(--hover); }
        .nav-item.active { font-weight: 800; }
        .btn-large { background: var(--blue); color: white; border: none; padding: 15px; border-radius: 99px; font-weight: bold; font-size: 1.1rem; cursor: pointer; width: 90%; margin-top: 15px; }
        
        /* Main Area */
        .main { flex: 1; max-width: 600px; border-right: 1px solid var(--border); overflow-y: auto; position: relative; display: flex; flex-direction: column; }
        .main::-webkit-scrollbar { display: none; }
        .glass-header { position: sticky; top: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(12px); z-index: 10; border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 15px; gap: 15px; }
        
        /* Composer & Cards */
        .composer { padding: 15px; border-bottom: 1px solid var(--border); display: flex; gap: 15px; }
        .avatar { width: 40px; height: 40px; background: #333; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; flex-shrink: 0; text-transform: uppercase; }
        .composer textarea { width: 100%; background: none; border: none; color: #fff; font-size: 1.25rem; outline: none; resize: none; min-height: 60px; padding-top: 10px; }
        .card { padding: 15px; border-bottom: 1px solid var(--border); display: flex; gap: 15px; transition: 0.2s; }
        .card:hover { background: rgba(255,255,255,0.02); }
        .card-actions { display: flex; gap: 30px; margin-top: 12px; color: var(--dim); }
        .action { display: flex; align-items: center; gap: 5px; font-size: 0.9rem; cursor: pointer; transition: 0.2s; }
        .action:hover { color: var(--blue); }
        .action.liked { color: #f91880; }

        /* Messages */
        .msg-bubble { padding: 10px 15px; border-radius: 18px; max-width: 75%; margin-bottom: 10px; word-wrap: break-word; }
        .msg-sent { background: var(--blue); align-self: flex-end; border-bottom-right-radius: 4px; }
        .msg-recv { background: #2f3336; align-self: flex-start; border-bottom-left-radius: 4px; }
        .chat-stream { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; }
    </style>
</head>
<body>
    <div class="layout">
        <nav class="nav">
            <div>
                <div style="font-size: 2.5rem; font-weight: 900; margin-bottom: 20px; padding-left: 15px;">P.</div>
                <div class="nav-links">
                    <div class="nav-item active" id="n-home" onclick="App.switch('home')"><i data-lucide="home"></i> Home</div>
                    <div class="nav-item" id="n-explore" onclick="App.switch('explore')"><i data-lucide="search"></i> Explore</div>
                    <div class="nav-item" id="n-messages" onclick="App.switch('messages')"><i data-lucide="mail"></i> Messages</div>
                    <div class="nav-item" id="n-profile" onclick="App.switch('profile')"><i data-lucide="user"></i> Profile</div>
                </div>
                <button class="btn-large" onclick="App.switch('home'); document.getElementById('postIn').focus();">Post</button>
            </div>
            <div class="nav-item" style="color:#f4212e;" onclick="App.logout()"><i data-lucide="log-out"></i> Logout</div>
        </nav>

        <main class="main">
            <div id="v-home" class="v">
                <div class="glass-header"><h2 style="font-size: 1.2rem;">Home</h2></div>
                <div class="composer">
                    <div class="avatar" id="my-avatar">?</div>
                    <div style="flex: 1;">
                        <textarea id="postIn" placeholder="What's happening?"></textarea>
                        <div style="text-align: right;"><button class="btn-large" style="width: 80px; padding: 8px; margin-top: 0;" onclick="Feed.post()">Post</button></div>
                    </div>
                </div>
                <div id="feed-stream"></div>
            </div>

            <div id="v-explore" class="v" style="display:none; padding: 15px;">
                <h2 style="margin-bottom: 15px;">Explore</h2>
                <input type="text" placeholder="Search users..." class="search-bar" style="width:100%; padding:15px; background:#202327; border:none; border-radius:99px; color:#fff; outline:none;" oninput="App.search(this.value)">
                <div id="search-results" style="margin-top:20px;"></div>
            </div>

            <div id="v-messages" class="v" style="display:none; flex-direction:column; height:100%;">
                <div id="msg-list-view">
                    <div class="glass-header"><h2>Messages</h2></div>
                    <div id="msg-contacts-root"></div>
                </div>
                <div id="msg-chat-view" style="display:none; flex-direction:column; height:100%;">
                    <div class="glass-header" onclick="DMs.closeChat()" style="cursor:pointer;"><i data-lucide="arrow-left"></i> <span id="chat-title">Chat</span></div>
                    <div class="chat-stream" id="chat-stream"></div>
                    <div style="padding:15px; border-top:1px solid var(--border);">
                        <input type="text" id="chatIn" placeholder="Send a message..." style="width:100%; padding:12px; background:#202327; border:none; border-radius:99px; color:#fff; outline:none;" onkeypress="if(event.key==='Enter') DMs.send()">
                    </div>
                </div>
            </div>

            <div id="v-profile" class="v" style="display:none;">
                <div class="glass-header"><h2>Profile</h2></div>
                <div style="padding: 20px; border-bottom: 1px solid var(--border);">
                    <div class="avatar" style="width: 80px; height: 80px; font-size: 2rem;" id="prof-av">?</div>
                    <h2 style="margin-top: 15px;" id="prof-name">@username</h2>
                    <p style="color: var(--dim); margin-top: 5px;" id="prof-bio">Bio loading...</p>
                    <div style="margin-top: 15px; display:flex; gap:10px;">
                        <input type="text" id="edit-bio" placeholder="New bio..." style="flex:1; background:#16181c; border:1px solid #333; color:#fff; padding:8px; border-radius:8px;">
                        <button class="btn-large" style="width:auto; padding:8px 20px; margin:0;" onclick="App.updateBio()">Save</button>
                    </div>
                </div>
                <div id="my-posts"></div>
            </div>
        </main>
    </div>

    <script>
        const _URL = 'https://aelkiokxzzfnfvermrjy.supabase.co';
        const _KEY = 'sb_publishable_r8ncudJ8R49sXNlsE3OKvA_D4Ak_CHC';
        const _db = supabase.createClient(_URL, _KEY);
        const BACKEND_URL = ''; 

        let me = null, likesSet = new Set(), activePeer = null;

        const App = {
            async init() {
                const { data: { session } } = await _db.auth.getSession();
                if(!session) { window.location.replace('auth.html'); return; }
                me = session.user;
                
                const { data: p } = await _db.from('profiles').select('*').eq('id', me.id).single();
                document.getElementById('my-avatar').innerText = p.username[0];
                document.getElementById('prof-av').innerText = p.username[0];
                document.getElementById('prof-name').innerText = `@${p.username}`;
                // Removed default student text here
                document.getElementById('prof-bio').innerText = p.bio || "No Bio";
                document.getElementById('edit-bio').value = p.bio || "";

                const { data: lks } = await _db.from('likes').select('post_id').eq('user_id', me.id);
                if(lks) lks.forEach(l => likesSet.add(l.post_id));

                lucide.createIcons();
                Feed.load();
                DMs.loadContacts();

                _db.channel('room1').on('postgres_changes', {event:'*', schema:'public', table:'world_posts'}, () => Feed.load()).subscribe();
                _db.channel('room2').on('postgres_changes', {event:'*', schema:'public', table:'messages'}, () => DMs.loadChat()).subscribe();
            },

            switch(id) {
                document.querySelectorAll('.v').forEach(v => v.style.display = 'none');
                document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
                const target = document.getElementById('v-'+id);
                target.style.display = (id === 'messages' || id === 'home') ? 'flex' : 'block';
                document.getElementById('n-'+id).classList.add('active');
                if(id === 'profile') Feed.loadMyPosts();
            },

            async updateBio() {
                const txt = document.getElementById('edit-bio').value;
                const { data: { session } } = await _db.auth.getSession();
                const res = await fetch(`${BACKEND_URL}/api/bio`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${session.access_token}` },
                    body: JSON.stringify({ bio: txt })
                });
                const result = await res.json();
                if(res.ok) { document.getElementById('prof-bio').innerText = result.bio; alert("Bio updated!"); }
                else { alert(result.error); }
            },

            async logout() { await _db.auth.signOut(); window.location.replace('auth.html'); }
        };

        const Feed = {
            async post() {
                const val = document.getElementById('postIn').value;
                if(!val) return;
                const { data: { session } } = await _db.auth.getSession();
                const res = await fetch(`${BACKEND_URL}/api/posts`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${session.access_token}` },
                    body: JSON.stringify({ content: val })
                });
                if(res.ok) { document.getElementById('postIn').value = ""; this.load(); }
                else { const err = await res.json(); alert(err.error); }
            },

            async load() {
                const { data } = await _db.from('world_posts').select(`id, content, profiles(username)`).order('created_at', {ascending: false});
                this.render(data, 'feed-stream');
            },

            async loadMyPosts() {
                const { data } = await _db.from('world_posts').select(`id, content, profiles(username)`).eq('user_id', me.id).order('created_at', {ascending: false});
                this.render(data, 'my-posts');
            },

            render(data, target) {
                document.getElementById(target).innerHTML = data.map(p => `
                    <div class="card">
                        <div class="avatar">${p.profiles.username[0]}</div>
                        <div style="flex:1">
                            <b>@${p.profiles.username}</b>
                            <p style="margin-top:5px;">${p.content}</p>
                            <div class="card-actions">
                                <div class="action ${likesSet.has(p.id)?'liked':''}" onclick="Feed.like(${p.id})"><i data-lucide="heart" style="width:18px;"></i></div>
                            </div>
                        </div>
                    </div>
                `).join('');
                lucide.createIcons();
            }
        };

        const DMs = {
            async loadContacts() {
                const { data } = await _db.from('profiles').select('*').neq('id', me.id);
                document.getElementById('msg-contacts-root').innerHTML = data.map(u => `
                    <div class="card" onclick="DMs.openChat('${u.id}', '${u.username}')">
                        <div class="avatar">${u.username[0]}</div><b>@${u.username}</b>
                    </div>
                `).join('');
            },

            openChat(id, name) {
                activePeer = id;
                document.getElementById('msg-list-view').style.display = 'none';
                document.getElementById('msg-chat-view').style.display = 'flex';
                document.getElementById('chat-title').innerText = `@${name}`;
                this.loadChat();
            },

            closeChat() { activePeer = null; document.getElementById('msg-chat-view').style.display = 'none'; document.getElementById('msg-list-view').style.display = 'block'; },

            async loadChat() {
                if(!activePeer) return;
                const { data } = await _db.from('messages').select('*').or(`and(sender_id.eq.${me.id},receiver_id.eq.${activePeer}),and(sender_id.eq.${activePeer},receiver_id.eq.${me.id})`).order('created_at', {ascending:true});
                const s = document.getElementById('chat-stream');
                s.innerHTML = data.map(m => `<div class="msg-bubble ${m.sender_id===me.id?'msg-sent':'msg-recv'}">${m.content}</div>`).join('');
                s.scrollTop = s.scrollHeight;
            },

            async send() {
                const el = document.getElementById('chatIn');
                if(!el.value || !activePeer) return;
                const { data: { session } } = await _db.auth.getSession();
                await fetch(`${BACKEND_URL}/api/messages`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${session.access_token}` },
                    body: JSON.stringify({ receiver_id: activePeer, content: el.value })
                });
                el.value = "";
                this.loadChat();
            }
        };

        App.init();
    </script>
</body>
</html>
